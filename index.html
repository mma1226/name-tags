document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

d03-ab83-5c54d56f0e0d\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n\n@font-face {\n  font-family: \"Goga\";\n  src: url(\"e9bd4878-dbb4-4f1e-8bb9-62405488061a\") format(\"opentype\");\n  font-weight: 400;\n  font-style: normal;\n  font-display: swap;\n}\n@font-face {\n  font-family: \"Goga\";\n  src: url(\"c60701df-589d-4094-b1ba-60ae81900e65\") format(\"opentype\");\n  font-weight: 600;\n  font-style: normal;\n  font-display: swap;\n}\n\n/* Inter + Fira Mono come from Google Fonts (linked in <head>).\n   Tosh Modal (used only for Avatar initials) and Basier Circle\n   are not available to us — fall back to Inter. */\n\n:root {\n  /* ---------- Base palette (Figma \"Color guidelines\") ---------- */\n  /* 100 swatches (most saturated) pulled verbatim from the file. */\n  --modal-red-100:        rgb(248, 113, 113);\n  --modal-pink-100:       rgb(255, 141, 230);\n  --modal-blue-100:       rgb(145, 200, 239);\n  --modal-orange-100:     rgb(255, 171,  94);\n  --modal-yellow-100:     rgb(255, 234, 113);\n  --modal-green-100:      rgb(127, 238, 100); /* signature Modal green */\n  --modal-pale-green-100: rgb(200, 249, 182);\n  --modal-gray-100:       rgb(255, 255, 255);\n\n  /* Data-viz accents used in charts */\n  --modal-teal:           rgb(  6, 146, 133);\n  --modal-peach:          rgb(246, 223, 200);\n  --modal-terracotta:     rgb(217, 134, 107);\n  --modal-other-gray:     rgb(109,  97,  97);\n\n  /* ---------- Neutral ramp (exact hex from swatch usage) ---------- */\n  --modal-gray-00:  rgb( 10,  10,  10);\n  --modal-gray-05:  rgb( 20,  20,  20);\n  --modal-gray-10:  rgb( 24,  24,  24); /* card / drawer background */\n  --modal-gray-15:  rgb( 28,  28,  28);\n  --modal-gray-20:  rgb( 36,  36,  36); /* table header background */\n  --modal-gray-30:  rgb( 39,  39,  39);\n  --modal-gray-40:  rgb( 47,  47,  47); /* default chip bg / input border */\n  --modal-gray-50:  rgb( 59,  59,  59);\n  --modal-gray-60:  rgb( 70,  70,  70); /* outline border */\n  --modal-gray-70:  rgb( 93,  93,  93);\n  --modal-gray-80:  rgb(114, 114, 114);\n  --modal-gray-85:  rgb(116, 116, 116); /* icon on outline button */\n  --modal-gray-90:  rgb(139, 139, 139); /* label text */\n  --modal-gray-92:  rgb(163, 163, 163); /* secondary text */\n  --modal-gray-94:  rgb(186, 186, 186); /* tertiary UI text */\n  --modal-gray-95:  rgb(209, 209, 209); /* body copy */\n  --modal-gray-97:  rgb(232, 232, 232); /* headings */\n  --modal-gray-99:  rgb(255, 255, 255);\n\n  /* ---------- Semantic — Background / Surface ---------- */\n  --bg-base:        var(--modal-gray-10);           /* app base */\n  --bg-offset:      var(--modal-gray-30);           /* selected callout */\n  --bg-highlight:   rgba(255, 255, 255, 0.06);      /* hover / separator */\n  --bg-canvas:      rgb(0, 0, 0);                   /* outermost */\n\n  /* Elevated surfaces (dropdown / drawer) */\n  --surface-10:     rgba(28, 28, 28, 0.90);         /* drawers, elev 10 */\n  --surface-50:     rgba(28, 28, 28, 0.90);         /* dropdowns, elev 50 */\n  --surface-90:     rgba(28, 28, 28, 0.95);         /* dialogs, elev 90 */\n  --surface-border: rgba(255, 255, 255, 0.06);\n  --surface-blur:   12px;\n\n  /* ---------- Semantic — Foreground ---------- */\n  --fg-1:           var(--modal-gray-99);           /* primary on dark */\n  --fg-2:           var(--modal-gray-97);           /* heading */\n  --fg-3:           var(--modal-gray-95);           /* body */\n  --fg-4:           var(--modal-gray-92);           /* secondary */\n  --fg-5:           var(--modal-gray-90);           /* muted */\n  --fg-6:           var(--modal-gray-85);           /* placeholder / icon */\n  --fg-7:           var(--modal-gray-70);           /* disabled */\n\n  /* ---------- Semantic — Border ---------- */\n  --border-1:       var(--modal-gray-40);           /* input default */\n  --border-2:       var(--modal-gray-60);           /* outline button */\n  --border-3:       var(--modal-gray-90);           /* focused input */\n  --border-subtle:  rgba(255, 255, 255, 0.06);\n\n  /* ---------- Semantic — Accent / Status ---------- */\n  --accent-primary:  var(--modal-green-100);        /* THE Modal green */\n  --accent-glow:     rgba(127, 238, 100, 0.50);     /* dot shadow */\n  --accent-wash:     rgba(127, 238, 100, 0.10);     /* active row bg */\n  --accent-ink:      rgb( 45,  67,  39);            /* green text on dark */\n  --accent-dim:      rgb( 86, 152,  70);            /* green secondary */\n\n  --status-success:  var(--modal-green-100);\n  --status-danger:   var(--modal-red-100);\n  --status-warning:  var(--modal-orange-100);\n  --status-info:     var(--modal-blue-100);\n  --status-pink:     var(--modal-pink-100);\n\n  --danger-wash:     rgba(248, 113, 113, 0.05);\n  --danger-ink:      rgb(158, 77, 77);\n\n  /* ---------- Type — families ---------- */\n  --font-sans:      \"Inter\", ui-sans-serif, system-ui, -apple-system,\n                    \"Segoe UI\", Roboto, \"Helvetica Neue\", Arial, sans-serif;\n  --font-display:   \"Goga\", \"Inter\", ui-sans-serif, system-ui, sans-serif;\n  --font-mono:      \"Fira Mono\", ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;\n\n  /* Modal uses Inter with `cv11` (single-story 'a') enabled. */\n  --font-feature-inter: \"cv11\" on, \"ss01\" on;\n\n  /* ---------- Type — scale (Inter / UI) ---------- */\n  --fs-xs:  10px;   --lh-xs:  15px;\n  --fs-sm:  12px;   --lh-sm:  16px;   /* chips, helper text */\n  --fs-md:  14px;   --lh-md:  20px;   /* body UI — dominant size */\n  --fs-lg:  16px;   --lh-lg:  24px;   /* prose */\n  --fs-xl:  18px;   --lh-xl:  28px;   /* section titles */\n  --fs-2xl: 20px;   --lh-2xl: 28px;\n  --fs-3xl: 24px;   --lh-3xl: 32px;\n  --fs-4xl: 36px;   --lh-4xl: 40px;\n\n  /* Display / Goga — h5 … h1 */\n  --fs-h5: 20px;    --lh-h5: 26px;\n  --fs-h4: 24px;    --lh-h4: 30px;\n  --fs-h3: 36px;    --lh-h3: 40px;\n  --fs-h2: 54px;    --lh-h2: 58px;\n  --fs-h1: 64px;    --lh-h1: 68px;\n\n  /* ---------- Radii (observed across components) ---------- */\n  --radius-1: 4px;  /* table cells, tags */\n  --radius-2: 6px;  /* buttons, cards */\n  --radius-3: 8px;  /* inputs */\n  --radius-pill: 12px; /* chips */\n\n  /* ---------- Shadows / Elevation ---------- */\n  --shadow-sm:  0 1px 2px 0 rgba(0, 0, 0, 0.25);\n  --shadow-md:  0 2px 8px 0 rgba(24, 24, 24, 0.20);\n  --shadow-lg:  0 8px 24px 0 rgba(0, 0, 0, 0.40);\n  --shadow-xl:  0 16px 48px 0 rgba(0, 0, 0, 0.55);\n  --shadow-glow: 2px 2px 5px 0 rgba(127, 238, 100, 0.10);\n\n  /* ---------- Spacing (observed 4px grid) ---------- */\n  --sp-1: 4px; --sp-2: 8px; --sp-3: 12px; --sp-4: 16px;\n  --sp-5: 20px; --sp-6: 24px; --sp-8: 32px; --sp-10: 42px;\n}\n\n/* ---------- Semantic type roles ---------- */\nhtml, body {\n  background: var(--bg-base);\n  color: var(--fg-3);\n  font-family: var(--font-sans);\n  font-feature-settings: var(--font-feature-inter);\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n}\n\n.h-display { font-family: var(--font-display); font-weight: 400;\n  font-size: var(--fs-h1); line-height: var(--lh-h1); color: var(--fg-1); letter-spacing: -0.01em; }\n.h1 { font: 500 var(--fs-h1)/var(--lh-h1) var(--font-display); color: var(--fg-1); }\n.h2 { font: 400 var(--fs-h2)/var(--lh-h2) var(--font-display); color: var(--fg-1); }\n.h3 { font: 400 var(--fs-h3)/var(--lh-h3) var(--font-display); color: var(--fg-1); }\n.h4 { font: 500 var(--fs-h4)/var(--lh-h4) var(--font-sans);    color: var(--fg-2); }\n.h5 { font: 500 var(--fs-h5)/var(--lh-h5) var(--font-sans);    color: var(--fg-2); }\n\n.eyebrow { font: 500 var(--fs-sm)/var(--lh-sm) var(--font-sans);\n  text-transform: uppercase; letter-spacing: 0.08em; color: var(--fg-5); }\n.body     { font: 400 var(--fs-lg)/var(--lh-lg) var(--font-sans); color: var(--fg-3); }\n.body-ui  { font: 400 var(--fs-md)/var(--lh-md) var(--font-sans); color: var(--fg-3); }\n.muted    { font: 400 var(--fs-md)/var(--lh-md) var(--font-sans); color: var(--fg-5); }\n.code     { font: 400 var(--fs-md)/var(--lh-md) var(--font-mono); color: var(--fg-3); }\n.kbd      { font: 500 var(--fs-sm)/var(--lh-sm) var(--font-mono); color: var(--fg-6);\n            background: var(--modal-gray-40); border-radius: 4px; padding: 2px 6px; }\n.label    { font: 500 var(--fs-md)/var(--lh-md) var(--font-sans); color: var(--fg-2); }\n.helper   { font: 400 var(--fs-sm)/var(--lh-sm) var(--font-sans); color: var(--fg-5); }\n<\u002Fstyle>\n  <script src=\"4d3dc1db-cfc8-48f4-89e4-12702de40260\"><\u002Fscript>\n  <style>\n    body { margin: 0; background: #0f0f0f; }\n    @page { size: letter portrait; margin: 0; }\n    @media print {\n      html { -webkit-print-color-adjust: exact; print-color-adjust: exact; }\n      body { background: #fff !important; }\n      .screen-only { display: none !important; }\n      .screen-shell { padding: 0 !important; background: #fff !important; min-height: 0 !important; }\n      .print-stage { padding: 0 !important; margin: 0 !important; background: #fff !important; border: none !important; border-radius: 0 !important; }\n      .print-scaler { width: auto !important; height: auto !important; }\n      .print-sheet { transform: none !important; box-shadow: none !important; }\n      .print-section { margin: 0 !important; max-width: none !important; }\n    }\n  <\u002Fstyle>\n<\u002Fhelmet>\n<div style=\"min-height:100vh; background:#0f0f0f; color:#e8e8e8; font-family:var(--font-sans); font-feature-settings:'cv11' on,'ss01' on; padding:56px clamp(20px,5vw,72px) 96px;\" class=\"screen-shell\">\n\n  <header class=\"screen-only\" style=\"max-width:1080px; margin:0 auto 8px;\">\n    <div style=\"font:600 12px/16px var(--font-sans); text-transform:uppercase; letter-spacing:0.14em; color:rgb(127,238,100);\">Modal · Event collateral<\u002Fdiv>\n    <h1 style=\"margin:10px 0 0; font:400 44px/48px var(--font-display); color:#fff; letter-spacing:-0.01em;\">Event name tags<\u002Fh1>\n    <p style=\"margin:12px 0 0; max-width:600px; font:400 15px/22px var(--font-sans); color:#a3a3a3;\">Self-contained badge builder sized to Avery&nbsp;5395 adhesive labels (3.375&nbsp;×&nbsp;2.31&nbsp;in). Click a name or company to type over it, and click the lower-right slot to upload that guest’s company logo — everything you change is saved in this browser. Use the controls below to set the printable sheet, then print.<\u002Fp>\n  <\u002Fheader>\n\n  <section class=\"screen-only\" style=\"max-width:1080px; margin:48px auto 0; display:flex; flex-direction:column; gap:14px;\">\n    <div style=\"display:flex; align-items:baseline; gap:12px;\">\n      <span style=\"font:500 13px/16px var(--font-sans); color:#e8e8e8;\">v1 — Name + company<\u002Fspan>\n      <span style=\"font:400 13px/16px var(--font-sans); color:#747474;\">editable · click to type, click the slot to upload a logo<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:28px;\">\n      <div style=\"display:flex; flex-direction:column; gap:10px;\">\n        <div style=\"font:600 11px/15px var(--font-sans); text-transform:uppercase; letter-spacing:0.13em; color:#747474;\">White<\u002Fdiv>\n        <dc-import name=\"EventTag\" theme=\"white\" mode=\"filled\" editable=\"true\" slot-id=\"hero-white\" glow=\"{{ glowAttr }}\" guest=\"Jordan Avery\" company=\"Northwind Labs\" hint-size=\"100%,auto\"><\u002Fdc-import>\n      <\u002Fdiv>\n      <div style=\"display:flex; flex-direction:column; gap:10px;\">\n        <div style=\"font:600 11px/15px var(--font-sans); text-transform:uppercase; letter-spacing:0.13em; color:#747474;\">Dark<\u002Fdiv>\n        <dc-import name=\"EventTag\" theme=\"dark\" mode=\"filled\" editable=\"true\" slot-id=\"hero-dark\" glow=\"{{ glowAttr }}\" guest=\"Jordan Avery\" company=\"Northwind Labs\" hint-size=\"100%,auto\"><\u002Fdc-import>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section class=\"screen-only\" style=\"max-width:1080px; margin:44px auto 0; display:flex; flex-direction:column; gap:14px;\">\n    <div style=\"display:flex; align-items:baseline; gap:12px;\">\n      <span style=\"font:500 13px/16px var(--font-sans); color:#e8e8e8;\">v2 — Blank for write-in<\u002Fspan>\n      <span style=\"font:400 13px/16px var(--font-sans); color:#747474;\">walk-ups &amp; on-site registration<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:28px;\">\n      <div style=\"display:flex; flex-direction:column; gap:10px;\">\n        <div style=\"font:600 11px/15px var(--font-sans); text-transform:uppercase; letter-spacing:0.13em; color:#747474;\">White<\u002Fdiv>\n        <dc-import name=\"EventTag\" theme=\"white\" mode=\"blank\" glow=\"{{ glowAttr }}\" hint-size=\"100%,auto\"><\u002Fdc-import>\n      <\u002Fdiv>\n      <div style=\"display:flex; flex-direction:column; gap:10px;\">\n        <div style=\"font:600 11px/15px var(--font-sans); text-transform:uppercase; letter-spacing:0.13em; color:#747474;\">Dark<\u002Fdiv>\n        <dc-import name=\"EventTag\" theme=\"dark\" mode=\"blank\" glow=\"{{ glowAttr }}\" hint-size=\"100%,auto\"><\u002Fdc-import>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section class=\"print-section\" style=\"max-width:1080px; margin:56px auto 0;\">\n    <div class=\"screen-only\" style=\"display:flex; flex-wrap:wrap; align-items:flex-end; justify-content:space-between; gap:20px; border-top:1px solid rgba(255,255,255,0.08); padding-top:24px;\">\n      <div style=\"display:flex; flex-direction:column; gap:6px;\">\n        <span style=\"font:500 13px/16px var(--font-sans); color:#e8e8e8;\">Print sheet — Avery 5395<\u002Fspan>\n        <span style=\"font:400 13px/16px var(--font-sans); color:#747474;\">8 badges per US&nbsp;Letter page · 2 columns × 4 rows<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:flex; flex-wrap:wrap; align-items:center; gap:18px;\">\n        <div style=\"display:flex; align-items:center; gap:8px;\">\n          <span style=\"font:600 11px/15px var(--font-sans); text-transform:uppercase; letter-spacing:0.12em; color:#747474;\">Theme<\u002Fspan>\n          <div style=\"{{ segWrap }}\">\n            <button type=\"button\" onclick=\"{{ setWhite }}\" style=\"{{ segWhite }}\">White<\u002Fbutton>\n            <button type=\"button\" onclick=\"{{ setDark }}\" style=\"{{ segDark }}\">Dark<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex; align-items:center; gap:8px;\">\n          <span style=\"font:600 11px/15px var(--font-sans); text-transform:uppercase; letter-spacing:0.12em; color:#747474;\">Tags<\u002Fspan>\n          <div style=\"{{ segWrap }}\">\n            <button type=\"button\" onclick=\"{{ setFilled }}\" style=\"{{ segFilled }}\">With names<\u002Fbutton>\n            <button type=\"button\" onclick=\"{{ setBlank }}\" style=\"{{ segBlank }}\">Blank<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <button type=\"button\" onclick=\"{{ toggleGlow }}\" style=\"{{ glowBtn }}\">Green glow<\u002Fbutton>\n        <button type=\"button\" onclick=\"{{ doPrint }}\" style=\"{{ printBtn }}\">\n          <svg viewBox=\"0 0 24 24\" width=\"16\" height=\"16\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M6 9V2h12v7\"><\u002Fpath><path d=\"M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2\"><\u002Fpath><rect x=\"6\" y=\"14\" width=\"12\" height=\"8\"><\u002Frect><\u002Fsvg>\n          Print sheet\n        <\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"print-stage\" style=\"margin-top:24px; display:flex; justify-content:center; background:#1a1a1a; border:1px solid rgba(255,255,255,0.07); border-radius:10px; padding:28px; overflow:hidden;\">\n      <div class=\"print-scaler\" style=\"width:{{ scaledW }}px; height:{{ scaledH }}px;\">\n        <div class=\"print-sheet\" style=\"{{ sheetStyle }}\">\n          <sc-for list=\"{{ sheetTags }}\" as=\"t\" hint-placeholder-count=\"8\">\n            <dc-import name=\"EventTag\" theme=\"{{ theme }}\" mode=\"{{ mode }}\" editable=\"true\" slot-id=\"{{ t.id }}\" glow=\"{{ glowAttr }}\" guest=\"{{ t.name }}\" company=\"{{ t.company }}\" hint-size=\"3.375in,2.3125in\"><\u002Fdc-import>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <p class=\"screen-only\" style=\"margin:14px auto 0; max-width:1080px; font:400 12px/18px var(--font-sans); color:#5d5d5d;\">In the print dialog choose US&nbsp;Letter, 100% scale, and turn off “Fit to page” and headers/footers so badges land in the die-cut cells. Run a plain-paper test against a blank Avery 5395 sheet first. Logos and typed names are stored in this browser only — share the folder, not your edits.<\u002Fp>\n  <\u002Fsection>\n\n  \n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;sheetTheme&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;white&quot;,&quot;dark&quot;],&quot;default&quot;:&quot;white&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Print sheet&quot;},&quot;sheetMode&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;filled&quot;,&quot;blank&quot;],&quot;default&quot;:&quot;filled&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;section&quot;:&quot;Print sheet&quot;},&quot;showGlow&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;,&quot;section&quot;:&quot;Style&quot;}}\">\nclass Component extends DCLogic {\n  constructor(props) {\n    super(props);\n    this.state = {\n      theme: props.sheetTheme || 'white',\n      mode: props.sheetMode || 'filled',\n      glow: props.showGlow !== false,\n    };\n  }\n\n  setWhite = () => this.setState({ theme: 'white' });\n  setDark = () => this.setState({ theme: 'dark' });\n  setFilled = () => this.setState({ mode: 'filled' });\n  setBlank = () => this.setState({ mode: 'blank' });\n  toggleGlow = () => this.setState((s) => ({ glow: !s.glow }));\n  doPrint = () => { try { window.print(); } catch (e) {} };\n\n  renderVals() {\n    const theme = this.state.theme;\n    const mode = this.state.mode;\n    const glow = this.state.glow;\n\n    const sheetTags = [\n      { id: 'sheet-1', name: 'Jordan Avery',     company: 'Northwind Labs' },\n      { id: 'sheet-2', name: 'Mara Okonkwo',     company: 'Helix Compute' },\n      { id: 'sheet-3', name: 'Devin Park',       company: 'Aperture AI' },\n      { id: 'sheet-4', name: 'Sofia Reyes',      company: 'Lumen Robotics' },\n      { id: 'sheet-5', name: 'Theo Lindqvist',   company: 'Vector Foundry' },\n      { id: 'sheet-6', name: 'Priya Nair',       company: 'Cobalt Systems' },\n      { id: 'sheet-7', name: 'Marcus Webb',      company: 'Orbital Data' },\n      { id: 'sheet-8', name: 'Nina Castellano',  company: 'Bright Mesa' },\n    ];\n\n    const scale = 0.62;\n\n    const segWrap = {\n      display: 'inline-flex', gap: '2px', padding: '3px',\n      background: 'rgba(255,255,255,0.05)', border: '1px solid rgba(255,255,255,0.08)',\n      borderRadius: '8px',\n    };\n    const segBase = {\n      display: 'inline-flex', alignItems: 'center', justifyContent: 'center',\n      height: '28px', padding: '0 12px', fontSize: '13px', fontWeight: 500,\n      fontFamily: 'var(--font-sans)', color: '#a3a3a3', background: 'transparent',\n      border: 'none', cursor: 'pointer', borderRadius: '5px',\n    };\n    const segOn = Object.assign({}, segBase, { color: 'rgb(127,238,100)', background: 'rgba(127,238,100,0.12)' });\n\n    const glowBtn = {\n      display: 'inline-flex', alignItems: 'center', height: '34px', padding: '0 14px',\n      borderRadius: '6px', fontSize: '13px', fontWeight: 500, fontFamily: 'var(--font-sans)',\n      cursor: 'pointer',\n      color: glow ? 'rgb(127,238,100)' : '#a3a3a3',\n      background: glow ? 'rgba(127,238,100,0.12)' : 'rgba(255,255,255,0.04)',\n      border: glow ? '1px solid rgba(127,238,100,0.4)' : '1px solid rgba(255,255,255,0.12)',\n    };\n    const printBtn = {\n      display: 'inline-flex', alignItems: 'center', gap: '8px', height: '34px', padding: '0 16px',\n      borderRadius: '6px', fontSize: '14px', fontWeight: 500, fontFamily: 'var(--font-sans)',\n      cursor: 'pointer', color: 'rgb(127,238,100)', background: 'rgba(127,238,100,0.12)',\n      border: '1px solid rgba(127,238,100,0.45)',\n    };\n\n    return {\n      glowAttr: glow ? 'true' : 'false',\n      theme,\n      mode,\n      sheetTags,\n      scaledW: Math.round(816 * scale),\n      scaledH: Math.round(1056 * scale),\n\n      segWrap,\n      segWhite: theme === 'white' ? segOn : segBase,\n      segDark: theme === 'dark' ? segOn : segBase,\n      segFilled: mode === 'filled' ? segOn : segBase,\n      segBlank: mode === 'blank' ? segOn : segBase,\n      glowBtn,\n      printBtn,\n\n      setWhite: this.setWhite,\n      setDark: this.setDark,\n      setFilled: this.setFilled,\n      setBlank: this.setBlank,\n      toggleGlow: this.toggleGlow,\n      doPrint: this.doPrint,\n\n      sheetStyle: {\n        width: '8.5in', height: '11in', boxSizing: 'border-box', background: '#ffffff',\n        display: 'grid', gridTemplateColumns: 'repeat(2, 3.375in)', gridAutoRows: '2.3125in',\n        columnGap: '0.13in', rowGap: '0.25in', justifyContent: 'center', alignContent: 'start',\n        padding: '0.5in 0.81in',\n        transform: 'scale(' + scale + ')', transformOrigin: 'top left',\n        boxShadow: '0 12px 40px rgba(0,0,0,0.5)',\n      },\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
